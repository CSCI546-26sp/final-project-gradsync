[project]
name = "telemetry"
version = "0.1.0"
description = "GradSync Telemetry Module"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn",
    "websockets",
    "torch==2.7.1",
]

[build-system]
requires = ["uv_build>=0.9.1,<0.10.0"]
build-backend = "uv_build"
